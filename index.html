<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Kactuif 地震情報作画ツール</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
    <div id="app">
        <div id="display-area">
            <div id="map-container">
                <p id="loading-text" style="color: white; text-align: center; padding-top: 300px;">地図を読み込んでいます...</p>
            </div>
        </div>
    </div>

    <div id="controls">
        <button id="btn-update">最新の地震情報を取得</button>
        <button id="btn-download">画像を保存 (PNG)</button>
        <div id="status-message">準備完了</div>
    </div>

    <script src="js/renderer.js"></script>
    <script src="js/api.js"></script>
    <script src="main.js"></script>
</body>
</html>
