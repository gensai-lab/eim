<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>地震情報作画ツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>地震情報作画システム</h1>
            <button id="btn-update">最新情報に更新</button>
            <button id="btn-download">画像を保存</button>
        </header>

        <main>
            <div id="map-container">
                </div>
            
            <canvas id="export-canvas" style="display:none;"></canvas>
        </main>

        <aside id="info-panel">
            <h2>地震情報</h2>
            <div id="quake-details">情報を取得中...</div>
        </aside>
    </div>

    <script src="js/api.js"></script>
    <script src="js/renderer.js"></script>
    <script src="main.js"></script>
</body>
</html>
