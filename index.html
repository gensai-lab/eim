<script>
    async function init() {
        try {
            const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([36.0, 137.0], 5);

            // 1. まず地図の土台だけは最優先で出す（自分のドメイン内にあるはずなので）
            const subRes = await fetch(SUBDIVISION_URL).catch(() => null);
            const prefRes = await fetch(PREF_URL).catch(() => null);

            if (subRes) {
                const subData = await subRes.json();
                L.geoJSON(subData, { style: { color: "#A6A6A6", weight: 1.5, fillColor: "#BFBFBF", fillOpacity: 1 } }).addTo(map);
            }
            if (prefRes) {
                const prefData = await prefRes.json();
                L.geoJSON(prefData, { style: { color: "#7F7F7F", weight: 2.5, fillOpacity: 0 } }).addTo(map);
            }

            // 2. 次に外部データ（P2P地震情報）を取得。エラーが出ても止まらないようにする
            const areaRes = await fetch(P2P_AREA_URL).catch(() => null);
            const quakeRes = await fetch(P2P_QUAKE_URL).catch(() => null);

            if (!areaRes || !quakeRes) {
                console.warn("外部APIへのアクセスが遮断されました(CORS)。サーバー上で実行してください。");
                document.getElementById('loader').innerText = "サーバー上で実行してください(CORS制限)";
                return;
            }

            const areaData = await areaRes.json();
            const quakeData = await quakeRes.json();
            const latest = quakeData[0];
            
            document.getElementById('loader').style.display = 'none';

            // （以下、震源・アイコン描画処理は前のコードと同じ）
            // ...
        } catch (e) { console.error(e); }
    }
    init();
</script>
