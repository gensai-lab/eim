name: Disaster Map Screenshot

on:
  workflow_dispatch:
  repository_dispatch:
    types: [p2p_update]
  schedule:
    - cron: '*/15 * * * *'

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Japanese Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Run Smart Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          (async () => {
            try {
              const response = await fetch('https://api.p2pquake.net/v2/history?codes=551&limit=1');
              const quakeData = await response.json();
              const latestId = quakeData[0].id;

              const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
              const page = await browser.newPage();
              await page.setViewport({ width: 1280, height: 720, deviceScaleFactor: 2 });

              console.log('Accessing Studio site...');
              await page.goto('https://tan172074.studio.site/', { waitUntil: 'networkidle2', timeout: 90000 });
              
              // 地図とアイコンの描画を待つために10秒待機
              await new Promise(r => setTimeout(r, 10000));

              // Studioバナー消去
              await page.evaluate(() => {
                const sel = ['div[id^=\"created-by-studio\"]', '.studio-banner', 'iframe[id^=\"studio-banner\"]'];
                sel.forEach(s => { const el = document.querySelector(s); if(el) el.style.display='none'; });
              });

              if (!fs.existsSync('screenshots')) fs.mkdirSync('screenshots');
              
              const filename = 'quake_' + latestId + '.png';
              await page.screenshot({ path: 'screenshots/' + filename, clip: { x: 0, y: 0, width: 1280, height: 720 } });
              await page.screenshot({ path: 'screenshots/latest.png', clip: { x: 0, y: 0, width: 1280, height: 720 } });

              fs.writeFileSync('last_id.txt', latestId);
              await browser.close();
            } catch (err) {
              console.error(err);
              process.exit(1);
            }
          })();
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/*.png last_id.txt
          git commit -m "Auto Update: Map Check" || exit 0
          git push
