name: Earthquake Screenshot Bot

on:
  repository_dispatch:
    types: [p2p_update] # GASからの通知を受けて起動

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 日本時間（JST）の現在時刻を取得して変数に格納
      - name: Get current time
        id: date
        run: |
          echo "today=$(TZ=Asia/Tokyo date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      # 2. 最新の地震データを取得（ファイル名やログ用）
      # ※ここでquake.jsonからIDなどを抜き出す処理があれば継続
      - name: Fetch Latest Data
        id: quake_data
        run: |
          # 必要に応じて、quake.jsonの中身を読み込む処理をここに
          echo "Fetched latest quake data"

      # 3. スクリーンショット実行（例：PuppeteerやPlaywrightを使用している想定）
      # ここで保存するファイル名に、先ほど取得した時刻（steps.date.outputs.today）を使います
      - name: Take Screenshot
        run: |
          # 実行コマンドの例（代表の環境に合わせて調整してください）
          # 例: node screenshot.js ${{ steps.date.outputs.today }}.png
          echo "Taking screenshot for ${{ steps.date.outputs.today }}.png"
          
      # 4. GitHubリポジトリへコミット＆プッシュ
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # メッセージにも日付を入れると管理しやすくなります
          git commit -m "Update screenshot: ${{ steps.date.outputs.today }}"
          git push
