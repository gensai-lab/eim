name: Automatic Screenshot

on:
  repository_dispatch:
    types: [p2p_update]
  workflow_dispatch:
    inputs:
      filename:
        description: '保存するファイル名'
        required: false
        default: 'manual-test'

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        # 警告が出ないよう、2026年の推奨バージョン 24 に指定
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot
        env:
          # Node 24環境での警告を抑制するおまじない
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            try {
              const browser = await puppeteer.launch({
                args: ['--no-sandbox', '--disable-setuid-sandbox']
              });
              const page = await browser.newPage();
              await page.setViewport({ width: 1280, height: 720 });
              
              console.log('Opening URL...');
              await page.goto('https://tan172074.studio.site/', { 
                waitUntil: 'networkidle2', 
                timeout: 60000 
              });
              
              console.log('Waiting for map to render...');
              await new Promise(r => setTimeout(r, 15000));
              
              const fname = '${{ github.event.client_payload.filename }}' || '${{ github.event.inputs.filename }}' || 'screenshot';
              console.log('Saving as: ' + fname + '.png');
              
              await page.screenshot({ path: 'screenshots/' + fname + '.png' });
              await browser.close();
              console.log('Done!');
            } catch (e) {
              console.error('Screenshot Failed: ' + e.message);
              process.exit(1);
            }
          })();"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p screenshots
          git add screenshots/
          git commit -m "Update Screenshot" || exit 0
          git push
