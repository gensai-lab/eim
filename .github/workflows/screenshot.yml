name: Automatic Screenshot

on:
  repository_dispatch:
    types: [p2p_update]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Take Screenshot
        # 公式のスクショツールを使用（追加インストール不要で高速）
        uses: flameddd/screenshot-action@v1.4.2
        with:
          url: https://tan172074.studio.site/
          width: 1280
          height: 720
          output: screenshots/${{ github.event.client_payload.filename }}.png
          # 地図の読み込みを待つための秒数（ミリ秒指定）
          delay: 10000 

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p screenshots
          git add screenshots/
          git commit -m "Add screenshot: ${{ github.event.client_payload.filename }}" || exit 0
          git push
