- name: Run Smart Screenshot Script
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          (async () => {
            // 1. 最新の地震IDをチェック
            const response = await fetch('https://api.p2pquake.net/v2/history?codes=551&limit=1');
            const quakeData = await response.json();
            const latestQuake = quakeData[0];
            const latestId = latestQuake.id;

            // 前回保存したIDを読み込み
            let lastId = '';
            if (fs.existsSync('last_id.txt')) {
              lastId = fs.readFileSync('last_id.txt', 'utf8').trim();
            }

            // IDが同じなら、更新がないので終了
            if (latestId === lastId) {
              console.log('地震情報の更新がないため、終了します。');
              process.exit(0);
            }

            console.log('新しい地震を検知しました。スクショを開始します。');

            // 2. スクリーンショット処理
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            
            // 1280x720 (16:9) に設定
            await page.setViewport({ width: 1280, height: 720, deviceScaleFactor: 2 }); // 高画質化のため2倍

            await page.goto('https://your-studio-url.com', { waitUntil: 'networkidle0', timeout: 60000 });
            
            // 情報が読み込まれるまで5秒待機
            console.log('読み込み待機中（5秒）...');
            await new Promise(resolve => setTimeout(resolve, 5000));

            if (!fs.existsSync('screenshots')) fs.mkdirSync('screenshots');
            
            const now = new Date();
            const filename = 'quake_' + latestId + '.png';
            
            // 撮影
            await page.screenshot({ 
              path: 'screenshots/' + filename,
              clip: { x: 0, y: 0, width: 1280, height: 720 } // 指定サイズでトリミング
            });
            await page.screenshot({ path: 'screenshots/latest.png', clip: { x: 0, y: 0, width: 1280, height: 720 } });

            // 今回のIDを保存
            fs.writeFileSync('last_id.txt', latestId);
            
            await browser.close();
            console.log('スクショ完了: ' + filename);
          })();
          "
