name: Automatic Screenshot

on:
  repository_dispatch:
    types: [p2p_update]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create Directory
        run: mkdir -p screenshots

      - name: Take Screenshot
        uses: swinton/screenshot-action@v2.1.0
        with:
          # ★ここにStudioの地図が表示されているURL（プレビューURLなど）を貼ってください
          url: https://tan172074.studio.site/  
          filename: screenshots/${{ github.event.client_payload.filename }}.png
          width: 1280
          height: 720
          delay: 5 # 地図の読み込み待ち時間（秒）

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          git commit -m "Add screenshot: ${{ github.event.client_payload.filename }}"
          git push
