- name: Run Smart Screenshot with Banner Removal
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          (async () => {
            try {
              // 1. 最新の地震IDをチェック（更新判定）
              const response = await fetch('https://api.p2pquake.net/v2/history?codes=551&limit=1');
              const quakeData = await response.json();
              const latestQuake = quakeData[0];
              const latestId = latestQuake.id;

              let lastId = '';
              if (fs.existsSync('last_id.txt')) lastId = fs.readFileSync('last_id.txt', 'utf8').trim();

              if (latestId === lastId) {
                console.log('更新がないため、終了します。');
                return;
              }

              // 2. スクリーンショット処理
              console.log('スクショを開始します。');
              const browser = await puppeteer.launch({ args: ['--no-sandbox', '--disable-setuid-sandbox'] });
              const page = await browser.newPage();
              
              // 1280x720 (16:9) に設定（ deviceScaleFactor: 2 で高画質化）
              await page.setViewport({ width: 1280, height: 720, deviceScaleFactor: 2 });

              // 代表のStudio URLへアクセス
              const url = 'https://tan172074.studio.site/';
              console.log('URLへアクセス中...');
              await page.goto(url, { waitUntil: 'networkidle0', timeout: 60000 });
              
              // 全体の読み込みを待つ
              console.log('5秒待機中...');
              await new Promise(r => setTimeout(r, 5000));

              // --- ★追加：左下のStudioバナーを消すCSSを注入★ ---
              console.log('Studioバナーを削除します...');
              await page.evaluate(() => {
                // 'Created in Studio'バナーを見つけるためのCSSセレクタ
                const banner = document.querySelector('div[id^="created-by-studio"]');
                if (banner) {
                  banner.style.display = 'none'; // 非表示にする
                }
              });

              // データ保存用フォルダ作成
              if (!fs.existsSync('screenshots')) fs.mkdirSync('screenshots');
              
              const filename = 'quake_' + latestId + '.png';
              
              // 撮影（1280x720 でトリミング）
              await page.screenshot({ 
                path: 'screenshots/' + filename, 
                clip: { x: 0, y: 0, width: 1280, height: 720 } 
              });
              await page.screenshot({ 
                path: 'screenshots/latest.png', 
                clip: { x: 0, y: 0, width: 1280, height: 720 } 
              });

              // IDを保存
              fs.writeFileSync('last_id.txt', latestId);
              
              await browser.close();
              console.log('保存完了: ' + filename);
            } catch (err) {
              console.error('エラー発生:', err);
              process.exit(1);
            }
          })();
          "
