name: Automatic Screenshot

on:
  repository_dispatch:
    types: [p2p_update]
  workflow_dispatch:
    inputs:
      filename:
        description: '保存するファイル名'
        required: false
        default: 'manual-test'

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      # --- ここから追加 ---
      - name: Wait for Information Update (5 minutes)
        run: sleep 300
      # --- ここまで追加 ---

      - name: Take Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            try {
              const browser = await puppeteer.launch({
                args: ['--no-sandbox', '--disable-setuid-sandbox']
              });
              const page = await browser.newPage();
              await page.setViewport({ width: 1280, height: 720 });
              
              await page.goto('https://tan172074.studio.site/', { 
                waitUntil: 'networkidle2', 
                timeout: 60000 
              });
              
              // 地図やデータの読み込み（レンダリング）を待つ
              await new Promise(r => setTimeout(r, 10000));
              
              // ★Studioバナーを消す処理
              await page.evaluate(() => {
                const badge = document.querySelector('div[class*=\"studio-badge\"]') || 
                              document.querySelector('a[href*=\"studio.design\"]')?.parentElement;
                if (badge) badge.style.display = 'none';
              });
              
              const fname = '${{ github.event.client_payload.filename }}' || '${{ github.event.inputs.filename }}' || 'screenshot';
              await page.screenshot({ path: 'screenshots/' + fname + '.png' });
              
              await browser.close();
            } catch (e) {
              console.error(e);
              process.exit(1);
            }
          })();"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p screenshots
          git add screenshots/
          git commit -m "Update Screenshot (Delayed 5m for Data Stability)" || exit 0
          git push

      - name: Send Image to Discord
        run: |
          # ファイル名を特定（GASからの指示 or 手動入力 or デフォルト）
          FILENAME="${{ github.event.client_payload.filename }}"
          if [ -z "$FILENAME" ]; then FILENAME="${{ github.event.inputs.filename }}"; fi
          if [ -z "$FILENAME" ]; then FILENAME="screenshot"; fi
          
          FILE_PATH="screenshots/${FILENAME}.png"
          
          # 通知本文を特定
          TWEET_BODY="${{ github.event.client_payload.tweet_body }}"
          if [ -z "$TWEET_BODY" ]; then TWEET_BODY="${{ github.event.inputs.tweet_body }}"; fi

          # Discord Webhookへ画像とテキストを同時送信
          curl -X POST \
            -F "payload_json={\"content\": \"$TWEET_BODY\"}" \
            -F "file=@$FILE_PATH" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
