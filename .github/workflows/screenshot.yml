name: Automatic Screenshot

on:
  repository_dispatch:
    types: [p2p_update]
  workflow_dispatch:
    inputs:
      filename:
        description: '保存するファイル名（拡張子なし）'
        required: false
        default: 'manual-test'

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            // 指定のサイズ
            await page.setViewport({ width: 1280, height: 720 });
            // 指定のURL
            await page.goto('https://tan172074.studio.site/', { waitUntil: 'networkidle2', timeout: 60000 });
            // 地図などの描画待ち（10秒）
            await new Promise(r => setTimeout(r, 10000));
            // ファイル名決定
            const fname = '${{ github.event.client_payload.filename }}' || '${{ github.event.inputs.filename }}' || 'screenshot';
            await page.screenshot({ path: 'screenshots/' + fname + '.png' });
            await browser.close();
          })();"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p screenshots
          git add screenshots/
          git commit -m "Add screenshot" || exit 0
          git push
