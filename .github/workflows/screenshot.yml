name: Smart Disaster Map Screenshot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *' # 5分おきにチェック

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions: # ジョブ内で権限を明示的に指定
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Japanese Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Run Smart Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          (async () => {
            try {
              // 地震情報をチェック
              const response = await fetch('https://api.p2pquake.net/v2/history?codes=551&limit=1');
              const quakeData = await response.json();
              const latestQuake = quakeData[0];
              const latestId = latestQuake.id;

              let lastId = '';
              if (fs.existsSync('last_id.txt')) lastId = fs.readFileSync('last_id.txt', 'utf8').trim();

              if (latestId === lastId) {
                console.log('更新なし。終了します。');
                return;
              }

              const browser = await puppeteer.launch({ args: ['--no-sandbox', '--disable-setuid-sandbox'] });
              const page = await browser.newPage();
              await page.setViewport({ width: 1280, height: 720, deviceScaleFactor: 2 });

              // ★ここを実際のStudio URLに必ず書き換えてください★
              const url = 'https://tan172074.studio.site/'; 
              console.log('URLへアクセス中...');
              await page.goto(url, { waitUntil: 'networkidle0', timeout: 60000 });
              
              console.log('5秒待機中...');
              await new Promise(r => setTimeout(r, 5000));

              if (!fs.existsSync('screenshots')) fs.mkdirSync('screenshots');
              
              const filename = 'quake_' + latestId + '.png';
              await page.screenshot({ path: 'screenshots/' + filename, clip: { x: 0, y: 0, width: 1280, height: 720 } });
              await page.screenshot({ path: 'screenshots/latest.png', clip: { x: 0, y: 0, width: 1280, height: 720 } });

              fs.writeFileSync('last_id.txt', latestId);
              await browser.close();
              console.log('保存完了: ' + filename);
            } catch (err) {
              console.error('エラー発生:', err);
              process.exit(1);
            }
          })();
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/*.png last_id.txt
          git commit -m "Auto Update: Earthquake Screenshot" || exit 0
          git push
