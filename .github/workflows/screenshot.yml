name: Automatic Screenshot

on:
  repository_dispatch:
    types: [p2p_update]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch();
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 720 });
            await page.goto('https://tan172074.studio.site/', { waitUntil: 'networkidle2' });
            await new Promise(r => setTimeout(r, 5000)); // 読み込み待ち
            await page.screenshot({ path: 'screenshots/${{ github.event.client_payload.filename }}.png' });
            await browser.close();
          })();"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p screenshots
          git add screenshots/
          git commit -m "Add screenshot: ${{ github.event.client_payload.filename }}"
          git push
